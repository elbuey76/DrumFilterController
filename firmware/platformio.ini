[platformio]
default_envs = kc868_a32

[env:kc868_a32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
  -D FAT_CONTROLLER_VERSION=\"0.1\"

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
  +<app/>
  +<sim/SimulatorCommands.cpp>
  +<sim/SimulatorLineBuffer.cpp>
