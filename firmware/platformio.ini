[platformio]
default_envs = kc868_a16_sim

[a16_esp32_base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  https://github.com/sstaub/LCD-I2C-HD44780.git#2.0.3
  adafruit/RTClib@2.1.4
  paulstoffregen/OneWire@2.3.8
  milesburton/DallasTemperature@4.0.6

[env:kc868_a16_sim]
extends = a16_esp32_base

build_flags =
  -D FAT_CONTROLLER_VERSION=\"0.2\"
  -D USE_SIM_INPUTS=1
  -D USE_KC868_IO=0
  -D USE_A16_AUXILIARIES=0
  -D HARDWARE_OUTPUTS_ARMED=0
  -D KC868_A16_PROFILE_ID=0

[env:kc868_a16_hw_safe]
extends = a16_esp32_base

build_flags =
  -D FAT_CONTROLLER_VERSION=\"0.2\"
  -D USE_SIM_INPUTS=0
  -D USE_KC868_IO=1
  -D USE_A16_AUXILIARIES=1
  -D HARDWARE_OUTPUTS_ARMED=0
  -D KC868_A16_PROFILE_ID=0

[env:kc868_a16_hw_armed]
extends = a16_esp32_base

build_flags =
  -D FAT_CONTROLLER_VERSION=\"0.2\"
  -D USE_SIM_INPUTS=0
  -D USE_KC868_IO=1
  -D USE_A16_AUXILIARIES=1
  -D HARDWARE_OUTPUTS_ARMED=1
  -D KC868_A16_PROFILE_ID=0

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
  +<app/>
  +<hal/Kc868Mapping.cpp>
  +<hal/Kc868A16Profile.cpp>
  +<hal/Kc868Pcf8574Io.cpp>
  +<sim/SimulatorCommands.cpp>
  +<sim/SimulatorLineBuffer.cpp>
